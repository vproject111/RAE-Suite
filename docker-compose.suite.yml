# RAE-Suite Factory Modules (v4.8) - SERVICE MODE WITH HEALTHCHECKS
services:
  rae-hive:
    build: ./packages/rae-hive
    container_name: rae-hive
    command: python hive_engine.py
    restart: unless-stopped
    environment:
      - RAE_API_URL=http://rae-memory:8000
    volumes:
      - ./packages/rae-hive:/app
      - ./packages/rae-lab/experiments:/app/experiments
      - ./packages/rae-agentic-memory/rae-core/rae_core:/app/rae_core
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/extra_storage/dreamsoft_factory:/projects
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-phoenix:
    build: ./packages/rae-phoenix
    container_name: rae-phoenix
    command: python main.py
    restart: unless-stopped
    environment:
      - RAE_API_URL=http://rae-memory:8000
    volumes:
      - ./packages/rae-phoenix:/app
      - ./packages/rae-lab/experiments:/app/experiments
      - ./packages/rae-agentic-memory/rae-core/rae_core:/app/rae_core
      - /mnt/extra_storage/dreamsoft_factory:/projects
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-quality:
    build: ./packages/rae-quality
    container_name: rae-quality
    restart: unless-stopped
    command: python main.py
    environment:
      - RAE_API_URL=http://rae-memory:8000
    volumes:
      - ./packages/rae-quality:/app
      - ./packages/rae-agentic-memory/rae-core/rae_core:/app/rae_core
      - /mnt/extra_storage/dreamsoft_factory:/projects:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-lab:
    build: ./packages/rae-lab
    container_name: rae-lab
    restart: unless-stopped
    command: python metrics_aggregator.py
    environment:
      - RAE_API_URL=http://rae-memory:8000
    volumes:
      - ./packages/rae-lab:/app
      - ./packages/rae-lab/experiments:/app/experiments
      - ./packages/rae-agentic-memory/rae-core/rae_core:/app/rae_core
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

networks:
  rae-internal:
    name: rae-internal
