services:
  rae-am-postgres:
    image: ankane/pgvector:latest
    container_name: rae-am-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae
    volumes:
      - rae-memory-db-data:/var/lib/postgresql/data
    networks:
      - rae-internal

  rae-am-redis:
    image: redis:7-alpine
    container_name: rae-am-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - rae-redis-cache-data:/data
    networks:
      - rae-internal

  rae-am-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-am-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - rae-qdrant-vector-data:/qdrant/storage
    networks:
      - rae-internal

  rae-memory:
    build:
      context: .
      dockerfile: ./packages/rae-agentic-memory/Dockerfile
    container_name: rae-memory
    restart: always
    ports:
      - "8000:8000"
    environment:
      - RAE_API_URL=http://localhost:8000
      - POSTGRES_HOST=rae-am-postgres
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae
      - REDIS_HOST=rae-am-redis
      - QDRANT_HOST=rae-am-qdrant
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app
    depends_on:
      - rae-am-postgres
      - rae-am-redis
    networks:
      - rae-internal

  rae-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rae-suite
    restart: always
    ports:
      - "8009:8009"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app
    depends_on:
      - rae-memory
    networks:
      - rae-internal

  rae-lab:
    build:
      context: .
      dockerfile: ./packages/rae-lab/Dockerfile
    container_name: rae-lab
    restart: always
    ports:
      - "8011:8011"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app/packages/rae-lab/src:/app
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-quality:
    build:
      context: .
      dockerfile: ./packages/rae-quality/Dockerfile
    container_name: rae-quality
    restart: always
    ports:
      - "8010:8010"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app
    volumes:
      - /mnt/extra_storage/dreamsoft_factory:/projects:ro
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-phoenix:
    build:
      context: .
      dockerfile: ./packages/rae-phoenix/Dockerfile
    container_name: rae-phoenix
    restart: always
    ports:
      - "8012:8012"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app
    volumes:
      - /mnt/extra_storage/dreamsoft_factory:/projects
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-hive:
    build:
      context: .
      dockerfile: ./packages/rae-hive/Dockerfile
    container_name: rae-hive
    restart: always
    ports:
      - "8013:8013"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/packages/rae-agentic-memory/rae-core/src:/app
    volumes:
      - /mnt/extra_storage/dreamsoft_factory:/projects
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-openclaw:
    build:
      context: ./packages/rae-open-claw
      dockerfile: Dockerfile.rae
    container_name: rae-openclaw
    restart: always
    ports:
      - "18789:18789"
    volumes:
      - ./.openclaw_config:/root/.openclaw
    command: ["node", "dist/index.js", "gateway"]
    networks:
      - rae-internal

volumes:
  rae-memory-db-data:
    external: true
  rae-redis-cache-data:
    external: true
  rae-qdrant-vector-data:
    external: true

networks:
  rae-internal:
    name: rae-internal
    driver: bridge
