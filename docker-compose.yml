services:
  rae-am-postgres:
    image: ankane/pgvector:latest
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae_password
    volumes:
      - ${RAE_DATA_DIR:-../RAE-agentic-memory/data}/postgres:/var/lib/postgresql/data
    networks:
      - rae-internal

  rae-am-redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ${RAE_DATA_DIR:-../RAE-agentic-memory/data}/redis:/data
    networks:
      - rae-internal

  rae-am-qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ${RAE_DATA_DIR:-../RAE-agentic-memory/data}/qdrant:/qdrant/storage
    networks:
      - rae-internal

  rae-memory:
    build:
      context: ./packages/rae-agentic-memory
      dockerfile: Dockerfile
    restart: always
    command: >
      bash -c "alembic upgrade head && uvicorn apps.memory_api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - RAE_API_URL=http://localhost:8000
      - POSTGRES_HOST=rae-am-postgres
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae_password
      - REDIS_HOST=rae-am-redis
      - QDRANT_HOST=rae-am-qdrant
      - PYTHONPATH=/app
      - ML_SERVICE_URL=
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
    depends_on:
      - rae-am-postgres
      - rae-am-redis
    networks:
      - rae-internal

  rae-suite:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8009:8009"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/src:/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
    depends_on:
      - rae-memory
    networks:
      - rae-internal

  rae-lab:
    build:
      context: .
      dockerfile: ./packages/rae-lab/Dockerfile
    restart: always
    ports:
      - "8011:8011"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app/src/rae_lab:/app/src:/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-quality:
    build:
      context: ./packages/rae-quality
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8010:8000"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
      - /mnt/extra_storage/dreamsoft_factory:/projects:ro
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-phoenix:
    build:
      context: ./packages/rae-phoenix
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8012:8000"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
      - /mnt/extra_storage/dreamsoft_factory:/projects
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-hive:
    build:
      context: .
      dockerfile: ./packages/rae-hive/Dockerfile
    restart: always
    ports:
      - "8013:8000"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
      - /mnt/extra_storage/dreamsoft_factory:/projects
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-openclaw:
    build:
      context: ./packages/rae-open-claw
      dockerfile: ../../infra/openclaw/Dockerfile.rae
    restart: always
    user: "node"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "18789:18789"
    command: ["node", "openclaw.mjs", "gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - RAE_TENANT_ID=53717286-fe94-4c8f-baf9-c4d2758eb672
      - RAE_PROJECT_NAME=dreamsoft_factory
      - NODE_ENV=production
      - HOME=/home/node
      - OPENCLAW_GATEWAY_TOKEN=secure_gateway_token_123
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
    volumes:
      # Hard Frames: Code remains internal to the image
      - ./.openclaw_config:/home/node/.openclaw:rw
      - /tmp:/tmp:rw
      - /mnt/extra_storage/dreamsoft_factory:/projects:ro
    networks:
      - rae-internal

  rae-supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8005:8005"
    command: python rae_mcp_server.py
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - RAE_MCP_SSE=1
      - RAE_MCP_PORT=8005
      - PYTHONPATH=/app
    volumes:
      - ./packages/rae-core/rae_core:/app/rae_core
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - rae-memory
    networks:
      - rae-internal

  rae-portal:
    build:
      context: ./packages/rae-agentic-memory/rae-portal
      dockerfile: Dockerfile
    container_name: rae-portal
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - RAE_API_URL=http://rae-memory:8000
    volumes:
      - ./packages/rae-agentic-memory/rae-portal:/app
    depends_on:
      - rae-memory
    networks:
      - rae-internal

  sonarqube:
    image: sonarqube:community
    restart: always
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_USERNAME=rae
      - SONAR_JDBC_PASSWORD=rae_password
      - SONAR_JDBC_URL=jdbc:postgresql://rae-am-postgres:5432/sonar
    depends_on:
      - rae-am-postgres
    networks:
      - rae-internal
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# Local folder bindings used, named volumes block removed

networks:
  rae-internal:
    name: rae-internal
    driver: bridge
